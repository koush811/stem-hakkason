<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Monitor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>寄り道なんかさせないよ☆</h1>

<div id="cameraArea">
  <video id="video" autoplay playsinline width="640"></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div>
    <select id="cameraSelect"></select>
    <button id="startBtn">カメラON</button>
    <button id="stopBtn">カメラOFF</button>
</div>

<div>
    <input type="number" id="timer" min="1" step="1" placeholder="分">
    <button id="timerStart">タイマー開始</button>
    <button id="timerPause" disabled>一時停止</button>
    <button id="timerReset" disabled>リセット</button>
</div>

<div id="timerDisplay"></div>

<div id="countdownDisplay"></div>

<div id="saboriDisplay"></div>

<p id="endMessage"></p>

<p>サボり回数: <span id="warnCount">0</span></p>

<p id="statusText"></p>

<button id="clearStorageBtn">データをリセット</button>

<audio id="studyVoice" src="0309.wav"></audio>

<hr>

<h2>勉強記録</h2>
<table id="historyTable">
  <thead>
    <tr>
      <th>日付</th>
      <th>勉強時間</th>
      <th>さぼった回数</th>
    </tr>
  </thead>
  <tbody id="historyBody">
  </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script src="script.js"></script>

</body>
</html>
