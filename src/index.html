<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Monitor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Study Monitor</h1>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<div class="controls">
<button id="startBtn">カメラON</button>
<button id="stopBtn">カメラOFF</button>

<select id="timer">
<option value="1800">30分</option>
<option value="3600">60分</option>
</select>

<button id="timerStart">タイマー開始</button>
<button id="timerPause" disabled>一時停止</button>
<button id="timerReset" disabled>リセット</button>

<div id="timerDisplay" style="display:none; font-size:24px; color:red; margin-top:10px; font-weight:bold;">0秒</div>

<p>サボり回数: <span id="warnCount">0</span></p>

<audio id="studyVoice" src="0309.WAV"></audio>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
